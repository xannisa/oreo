name: CI/CD Pipeline

on:
  push:
    paths:
      - 'Dockerfile'
      - 'docker-compose.yaml'

jobs:

  # 🏗️ BUILD JOB (only runs when Dockerfile changes)
  build:
    runs-on: ubuntu-latest
    if: contains(join(github.event.commits.*.modified, ','), 'Dockerfile')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t my-image .

  # 🚀 DEPLOY JOB (runs when either file changes)
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: |
      contains(join(github.event.commits.*.modified, ','), 'Dockerfile') ||
      contains(join(github.event.commits.*.modified, ','), 'docker-compose.yaml')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy (example)
        run: docker compose up -d