name: CI/CD Pipeline

on:
  push:
    paths:
      - 'Dockerfile'
      - 'docker-compose.yaml'

jobs:

  # 🏗️ BUILD JOB (only when Dockerfile changes)
  build:
    if: contains(github.event.head_commit.modified, 'Dockerfile')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/nginx-php:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/nginx-php:latest


  # 🚀 DEPLOY JOB (when Dockerfile OR docker-compose changes)
  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: |
      contains(github.event.head_commit.modified, 'Dockerfile') ||
      contains(github.event.head_commit.modified, 'docker-compose.yaml')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH (run docker compose on server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/app
            docker compose pull
            docker compose up -d --force-recreate
