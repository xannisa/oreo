name: CI/CD Pipeline

on:
  push:
    paths:
      - '**/Dockerfile*'
      - '**/docker-compose.yaml'

jobs:
  # PRE-CHECK: This job detects what actually changed
  check_changes:
    runs-on: ubuntu-latest
    outputs:
      dockerfile_changed: ${{ steps.filter.outputs.dockerfile }}
      compose_changed: ${{ steps.filter.outputs.compose }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            dockerfile:
              - '**/Dockerfile*'
            compose:
              - '**/docker-compose.yaml'

  # BUILD: Only runs if Dockerfile changed
  build:
    needs: check_changes
    if: needs.check_changes.outputs.dockerfile_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t my-image .

  # DEPLOY: Runs if Dockerfile OR Compose changed
  deploy:
    needs: [check_changes, build]
    # The 'if' logic:
    # 1. Success if: Build finished OR Build was skipped because no Dockerfile change
    # 2. AND: Something relevant changed (Dockerfile or Compose)
    if: |
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.check_changes.outputs.dockerfile_changed == 'true' || needs.check_changes.outputs.compose_changed == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: docker compose up -d