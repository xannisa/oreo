name: CI/CD Pipeline

on:
  push:
    paths:
      - 'Dockerfile'
      - 'docker-compose.yaml'

jobs:
  build:
    runs-on: ubuntu-latest
    # This job ONLY runs if the Dockerfile was changed
    if: contains(join(github.event.commits.*.added, ','), 'Dockerfile') || contains(join(github.event.commits.*.modified, ','), 'Dockerfile')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t my-image .

  deploy:
    runs-on: ubuntu-latest
    # This job runs if build succeeds OR if build was skipped
    if: |
      always() && 
      (contains(join(github.event.commits.*.modified, ','), 'Dockerfile') || 
       contains(join(github.event.commits.*.modified, ','), 'docker-compose.yaml'))
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: docker compose up -d