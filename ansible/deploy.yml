# deploy.yml
- name: Deploy Docker Compose Application (Force Update)
  hosts: app_servers
  become: true

  vars:
    app_dir: /opt/myapp

  tasks:
    - name: Ensure application directory exists
      file:
        path: "{{ app_dir }}"
        state: directory
        mode: '0755'

    - name: Copy docker-compose file
      copy:
        src: docker-compose.yaml
        dest: "{{ app_dir }}/docker-compose.yaml"

    - name: Copy nginx configuration
      copy:
        src: nginx/nginx.conf
        dest: "{{ app_dir }}/nginx.conf"

    - name: Copy PHP application files
      copy:
        src: php-app/
        dest: "{{ app_dir }}/php-app/"

    - name: Pull latest Docker images
      command: docker compose pull
      args:
        chdir: "{{ app_dir }}"

    - name: Force recreate containers (update)
      command: docker compose up -d --force-recreate --remove-orphans
      args:
        chdir: "{{ app_dir }}"