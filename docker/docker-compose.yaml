version: '3.8'

services:
  web:
    image: nisahello/nginx-php:latest
    container_name: nginx_php_app
    ports:
      - "8080:80"
    volumes:
      - ./index.php:/var/www/localhost/htdocs/index.php
  
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - app-network

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    deploy:
      replicas: 1
      restart_policy:
        condition: any
