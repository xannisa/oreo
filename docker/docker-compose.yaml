version: '3.8'

networks:
  web-network:
    driver: bridge  

services:
  web:
    image: nisahello/docker:v1
    container_name: php-web-server
    volumes:
      - ./index.php:/var/www/localhost/htdocs/index.php
    networks:
      - web-network
  
  nginx:
    image: nisahello/docker:v1
    ports:
      - "80:80"
    networks:
      - web-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web